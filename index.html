<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<div class="card">

<h1>🌤 Weather App</h1>

<p class="subtitle">
Real-Time Weather Forecast
</p>

<div class="search-box">

<input
type="text"
id="city"
placeholder="Search City...">
<button id="searchBtn">
Search
</button>
<button id="locationBtn" class="location-btn">
📍 Use Current Location
</button>

</div>

<div class="weather">

<img
id="weatherIcon"
class="weather-icon"
src=""
alt="Weather Icon">

<h2 id="cityName">
City Name
</h2>

<h1 id="temp">
--°C
</h1>

<p id="description">
Weather Description
</p>
<div class="info">

<div class="box">
<span>💧</span>
<h3 id="humidity">--</h3>
<p>Humidity</p>
</div>

<div class="box">
<span>💨</span>
<h3 id="wind">--</h3>
<p>Wind</p>
</div>

<div class="box">
<span>🌡️</span>
<h3 id="feelsLike">--</h3>
<p>Feels Like</p>
</div>

<div class="box">
<span>👁️</span>
<h3 id="visibility">--</h3>
<p>Visibility</p>
</div>

</div>

<div class="box">

<span>🌬️</span>

<h3 id="wind">
--
</h3>

<p>Wind</p>

</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
